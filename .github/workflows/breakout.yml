name: Generate Breakout SVG

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate-svg:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate custom Breakout SVG
        uses: cyprieng/github-breakout@v1
        with:
          github_username: ${{ github.repository_owner }}
          enable_ghost_bricks: false
          paddle_color: "#58A6FF"
          ball_color: "#58A6FF"
          bricks_colors: "#484F58,#0E4429,#006D32,#26A641,#39D353"

      - name: Move generated SVG
        run: |
          mkdir -p /tmp/breakout-images
          mv output/custom.svg /tmp/breakout-images/breakout-custom.svg

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish SVG to github-breakout branch
        run: |
          git checkout --orphan github-breakout
          git rm -rf .
          mkdir images
          mv /tmp/breakout-images/* images/
          git add images
          git commit -m "chore: update GitHub Breakout SVG"
          git push --force origin github-breakout
